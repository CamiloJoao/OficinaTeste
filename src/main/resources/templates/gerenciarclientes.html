<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="conteudo">

    <h1>Gerenciar Clientes</h1>

    <!--BUSCA + BOTÃO -->
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">

        <!-- FORM DE BUSCA -->
        <form th:action="@{/gerenciarclientes}" method="get">
            <input type="text" name="nome" placeholder="Buscar cliente pelo nome">
            <button type="submit">Buscar</button>

        <!--LIMPAR BUSCA-->    
           <a th:if="${erroBusca == null 
                    and clientes != null 
                    and #lists.isEmpty(clientes) 
                    and param.nome != null 
                    and param.nome != ''}"
                th:href="@{/gerenciarclientes}">
                <button type="button">Voltar</button>
            </a>
            
        </form>

        <!--USUÁRIO DIGITOU ALGO INESPERADO NO CAMPO BUSCA-->
        <div th:if="${erroBusca != null}" style="color: rgb(0, 0, 0); margin-left: 5px;">
            <p th:text="${erroBusca}"></p>
        </div>

        <!-- BOTÃO CADASTRAR -->
        <a href="/gerenciarclientes/cadastrar">
            <button>Cadastrar Novo Cliente</button>
        </a>

    </div>


    <!--TABELA DE CLIENTES -->
    <div th:if="${clientes != null and !#lists.isEmpty(clientes)}">

        <p>Clientes cadastrados</p>

        <table border="1" width="100%" cellspacing="0" cellpadding="8">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="cliente, stat : ${clientes}"
                    th:if="${stat.index < 5 or mostrarTodos}">

                    <td th:text="${cliente.idCliente}"></td>
                    <td th:text="${cliente.nomeCliente}"></td>
                    <td th:text="${cliente.telefone}"></td>
                    <td th:text="${cliente.emailCliente}"></td>

                    <td>
                        <a th:href="@{'/gerenciarclientes/editar/' + ${cliente.idCliente}}">
                            <button>Editar</button>
                        </a>

                        <a th:href="@{'/gerenciarclientes/excluir/' + ${cliente.idCliente}}"
                        onclick="return confirm('Tem certeza que deseja excluir este cliente?')">
                            <button>Excluir</button>
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>

       <!--BOTÕES VER MAIS / VER MENOS -->
    <div style="margin-top: 15px;">

       <!-- VER MAIS -->
        <div th:if="${clientes.size() > 5 
                    and !mostrarTodos 
                    and (param.nome == null or param.nome == '')}">
            
            <a th:href="@{/gerenciarclientes(mostrarTodos=true)}">
                <button>Ver mais</button>
            </a>

        </div>

        <!-- VER MENOS -->
        <div th:if="${mostrarTodos 
                    and clientes.size() > 5 
                    and (param.nome == null or param.nome == '')}">
            
            <a th:href="@{/gerenciarclientes}">
                <button>Ver menos</button>
            </a>

        </div>

    </div> 

    </div>

    <!--SEM RESULTADO NA BUSCA -->
    <div th:if="${erroBusca == null 
        and clientes != null 
        and #lists.isEmpty(clientes) 
        and param.nome != null 
        and param.nome != ''}">
        <p>Nenhum cliente cadastrado com este nome.</p>
    </div>

    <!--SEM CLIENTES CADASTRADOS -->
    <div th:if="${clientes != null 
            and #lists.isEmpty(clientes) 
            and (param.nome == null or param.nome == '')}">
        <p>Nenhum cliente cadastrado.</p>
    </div>

</div>

</body>
</html>
