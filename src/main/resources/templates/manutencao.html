<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="conteudo">

    <h1>Manutenção</h1>

    

    <div class="conteudo centralizado">
        <div class="descricaoBox">
            
            <h3>Cadastrar manutenção:</h3>

            <!-- MENSAGEM DE ERRO -->
            <div th:if="${erro != null}" style="color: red; margin-bottom: 15px;">
                <p th:text="${erro}"></p>
            </div>


            <form th:action="@{/manutencao/salvar}" method="post">

                <!-- CLIENTE -->
                <div class="form-group">
                    <label>E-mail do Cliente:</label>
                    <input type="email" name="emailCliente" placeholder="Digite o e-mail" required>
                </div> 

            

                <!-- STATUS FIXO -->
                <label>Status da OS:</label>
                <p>Em Andamento</p>

                <!-- PROBLEMA -->
                <label>Problema:</label>
                <select name="problemaSelecionado" required>
                    <option value="">Selecione</option>
                    <option>Computador não liga</option>
                    <option>Reiniciando constantemente</option>
                    <option>Computador desliga sozinho</option>
                    <option>Sem sinal no monitor</option>
                    <option>Computador lento</option>
                    <option>Tela azul frequente</option>
                </select>

                <!-- DESCRIÇÃO OPCIONAL -->
                <div class="form-group">
                    <label>Descrição adicional:</label>
                    <input type="text" name="descricao" placeholder="Detalhes adicionais (opcional)">
                </div>



                <!-- DATA -->
                <div class="form-group">
                    <label>Data de conclusão prevista:</label>
                    <input type="date" name="dataPrevista" required>
                </div>

    

                <!-- ORÇAMENTO -->
                <div class="form-group">
                    <label>Orçamento inicial:</label>
                    <input type="number" step="0.01" name="orcamento" placeholder="Digite o orçamento inicial" required>
                </div>     
                

                <!-- BOTÃO -->
                <button type="submit">Cadastrar manutenção</button>

            </form>

            <!--MENSAGEM DE SUCESSO -->
            <div th:if="${sucesso}">
                <p th:text="${sucesso}" style="color: green;"></p>
            </div>
        </div>    
    </div>    
</div>

</body>
</html>
