<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="conteudo">

    <h1>Detalhes do serviço</h1>

    <div class="conteudo centralizado">
        <div class="descricaoBox">

            <p><b>Cliente:</b> 
                <span th:text="${servico.cliente.nomeCliente}"></span>
            </p>

            <p><b>Tipo de serviço:</b> Montagem</p>

            <p><b>Orçamento inicial:</b>
                <span th:text="${servico.orcamentoInicial}"></span>
            </p>

            <p><b>Peças acrescentadas:</b></p>

            <div th:if="${#lists.isEmpty(pecasExtras)}">
                Nenhuma peça acrescentada - R$ 0.00
            </div>

            <div th:if="${!#lists.isEmpty(pecasExtras)}">

                <ul>
                    <li th:each="p : ${pecasExtras}">
                        <span th:text="${p.nomePeca}"></span> - 
                        R$ <span th:text="${p.valor}"></span>
                    </li>
                </ul>

            </div>

            <p><b>Orçamento final:</b>
                <span th:text="${servico.orcamentoFinal}"></span>
            </p>

            <hr>
            
            <!--FORM ÚNICO PARA ATUALIZAR -->
            <div class="boxtable">
                <h3>Peças cadastradas</h3>
                <form action="/statusdeservico/editar-lote" method="post">

                    <input type="hidden" name="idServico" th:value="${servico.idServico}">

                    <table border="1" cellpadding="10">
                        <tr>
                            <th>Tipo</th>
                            <th>Ver / Editar peça</th>
                        </tr>

                        <!-- PLACA MÃE -->
                        <tr>
                            <td>Placa-mãe</td>
                            <td>
                                <select name="placaMae">
                                    <option th:each="p : ${placaMae}"
                                            th:value="${p.id_placamae}"
                                            th:text="${p.modelo}"
                                            th:selected="${p.id_placamae == placaAtual}">
                                    </option>
                                </select>
                            </td>
                        </tr>

                        <!-- PROCESSADOR -->
                        <tr>
                            <td>Processador</td>
                            <td>
                                <select name="processador">
                                    <option th:each="p : ${processador}"
                                            th:value="${p.id_processador}"
                                            th:text="${p.modelo}"
                                            th:selected="${p.id_processador == processadorAtual}">
                                    </option>
                                </select>
                            </td>
                        </tr>

                        <!-- RAM -->
                        <tr>
                            <td>Memória RAM</td>
                            <td>
                                <select name="memoriaRam">
                                    <option th:each="m : ${memoriaRam}"
                                            th:value="${m.id_memoriaRam}"
                                            th:text="${m.modelo}"
                                            th:selected="${m.id_memoriaRam == ramAtual}">
                                    </option>
                                </select>
                            </td>
                        </tr>

                        <!-- ARMAZENAMENTO -->
                        <tr>
                            <td>Armazenamento</td>
                            <td>
                                <select name="armazenamento">
                                    <option th:each="a : ${armazenamento}"
                                            th:value="${a.id_armazenamento}"
                                            th:text="${a.modelo}"
                                            th:selected="${a.id_armazenamento == armazenamentoAtual}">
                                    </option>
                                </select>
                            </td>
                        </tr>

                    </table>

                    <br>

                    <button type="submit">Atualizar configuração</button>

                </form>
            </div>

            <!--MENSAGEM DE "NADA ALTERADO"-->    
            <div th:if="${msg}" style="color: green;">
                <p th:text="${msg}"></p>
            </div>    

            <!--MENSAGEM DE "Peças incompatíveis"--> 
            <div th:if="${msgErro}" style="color:red;">
                <p th:text="${msgErro}"></p>
            </div>

            <hr>


            <br>

            <!--ADICIONAR PEÇA EXTRA -->
        

            <h3>Adicionar peça extra</h3>

            <form action="/statusdeservico/adicionar-peca-json" method="post">

                <input type="hidden" name="idServico" th:value="${servico.idServico}">

                <!--TIPO DA PEÇA -->
                <label>Tipo da peça:</label>
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione</option>
                    <option value="placa_mae">Placa-mãe</option>
                    <option value="processador">Processador</option>
                    <option value="memoria_ram">Memória RAM</option>
                    <option value="armazenamento">Armazenamento</option>
                </select>

                <br><br>

                <div id="containerPeca" style="display: none";>
                    <label>Escolher peça:</label>
                    <select id="peca" name="idReferencia" required>

                        <option value="">Selecione</option>

                        <!-- PLACA MÃE -->
                        <option th:each="p : ${placaMae}"
                                th:value="${p.id_placamae}"
                                th:text="${p.modelo}"
                                th:attr="data-tipo='placa_mae'">
                        </option>

                        <!-- PROCESSADOR -->
                        <option th:each="p : ${processador}"
                                th:value="${p.id_processador}"
                                th:text="${p.modelo}"
                                th:attr="data-tipo='processador'">
                        </option>

                        <!-- RAM -->
                        <option th:each="m : ${memoriaRam}"
                                th:value="${m.id_memoriaRam}"
                                th:text="${m.modelo}"
                                th:attr="data-tipo='memoria_ram'">
                        </option>

                        <!-- ARMAZENAMENTO -->
                        <option th:each="a : ${armazenamento}"
                                th:value="${a.id_armazenamento}"
                                th:text="${a.modelo}"
                                th:attr="data-tipo='armazenamento'">
                        </option>
                    
                    </select>
                </div>
            
                <button type="submit">Adicionar peça</button>

            </form>

            <hr>
            <br>

            <!--ENCERRAR -->
            <form action="/statusdeservico/encerrar" method="post">
                <input type="hidden" name="idServico" th:value="${servico.idServico}">
                <button type="submit">Encerrar serviço</button>
            </form>

            <script>
            document.addEventListener("DOMContentLoaded", function () {

                const tipoSelect = document.getElementById("tipo");
                const selectPeca = document.getElementById("peca");
                const container = document.getElementById("containerPeca");

                if (!container) return; // 🔥 evita erro silencioso

                function filtrarPecas() {

                    const tipoSelecionado = tipoSelect.value;
                    const opcoes = selectPeca.options;

                    if (!tipoSelecionado) {
                        container.style.display = "none";
                    } else {
                        container.style.display = "block";
                    }

                    for (let i = 0; i < opcoes.length; i++) {

                        const tipoOpcao = opcoes[i].getAttribute("data-tipo");

                        opcoes[i].hidden = tipoOpcao !== tipoSelecionado;
                    }

                    selectPeca.selectedIndex = 0;
                }

                tipoSelect.addEventListener("change", filtrarPecas);

                filtrarPecas();
            });
            </script>
        </div>    
    </div>
</div>

</body>
</html>
