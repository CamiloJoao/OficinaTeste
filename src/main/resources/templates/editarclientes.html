<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="conteudo">


    <h1>Editar Cliente</h1>

    <div class="conteudo centralizado">
        <div class="descricaoBox">

            <form th:action="@{/gerenciarclientes/atualizar}" th:object="${cliente}" method="post">

                <input type="hidden" th:field="*{idCliente}">

                <div class="form-group">
                    <label>Nome completo:</label>
                    <input type="text" th:field="*{nomeCliente}" placeholder="Digite o nome completo" required>
                </div>

                <div class="form-group">
                    <label>Telefone:</label>
                    <input type="text" th:field="*{telefone}" placeholder="Digite o telefone" required>
                </div>

                <div class="form-group"> 
                    <label>Email:</label>
                    <input type="email" th:field="*{emailCliente}" placeholder="Digite o e-mail" required>
                </div>    

                <button type="submit">Atualizar</button>

                <a href="/gerenciarclientes">
                    <button type="button">Cancelar</button>
                </a>

            </form>
        </div>    
    </div>    
</div>

</body>
</html>
