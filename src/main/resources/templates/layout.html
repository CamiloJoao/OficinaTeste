<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            background-color: #d9d9d9;
        }

        .menu {
            width: 220px;
            background: #999;
            color: white;
            height: 100vh;
            padding: 20px;
            
        }

        .menu a {
            display: block;
            color: black;
            text-decoration: none;
            margin: 10px 0;
            padding: 8px;
            border-radius: 5px;
            font-size: 20px;
        }

        .menu a:hover {
            background: #444;
            color: white;
        }

        .menu a.ativo {
            background-color: #cacaca;
            font-weight: bold;
            color: black;
        }

        .conteudo {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <div th:replace="fragments/menu :: menu"></div>

    <!-- CONTEÚDO -->
    <div class="conteudo">
        <div th:replace="~{${pagina} :: conteudo}"></div>
    </div>

</body>
</html>
